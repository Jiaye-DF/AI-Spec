<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none'><line x1='8' y1='4.5' x2='4' y2='11.5' stroke='%232563eb' stroke-width='1.4' stroke-linecap='round'/><line x1='8' y1='4.5' x2='12' y2='11.5' stroke='%232563eb' stroke-width='1.4' stroke-linecap='round'/><circle cx='8' cy='4' r='2.5' fill='%232563eb'/><circle cx='4' cy='12' r='2.5' fill='%2360a5fa'/><circle cx='12' cy='12' r='2.5' fill='%2360a5fa'/></svg>">
  <title>Harness Engineering — Breakdown v1.0 (Vibe Coding 公司版)</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f8fafc;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --toolbar-bg: #f8fafc;
      --btn-bg: #ffffff;
      --btn-hover: #f1f5f9;
      --accent: #2563eb;
      --error: #dc2626;
      --user: #16a34a;
      --it: #2563eb;
      --shared: #9333ea;
      --critical: #dc2626;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-soft: #1e293b;
      --fg: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --toolbar-bg: #1e293b;
      --btn-bg: #1e293b;
      --btn-hover: #334155;
      --accent: #60a5fa;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--fg);
    }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ---- toolbar ---- */
    .toolbar {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 12px 20px;
      background: var(--toolbar-bg);
      border-bottom: 2px solid var(--border);
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 16px;
      margin: 0;
      margin-right: auto;
      font-weight: 700;
      color: var(--accent);
      padding-left: 12px;
      border-left: 4px solid var(--accent);
      line-height: 1.3;
      letter-spacing: 0.02em;
      max-width: 40%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toolbar .divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .toolbar button, .toolbar select, .toolbar input {
      padding: 6px 11px; font-size: 13px;
      border: 1px solid var(--border);
      background: var(--btn-bg); color: var(--fg);
      border-radius: 5px; cursor: pointer; font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .toolbar button:hover, .toolbar select:hover {
      background: var(--btn-hover); border-color: var(--accent);
    }
    .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .toolbar label {
      font-size: 12px; color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px;
      font-weight: 500;
    }
    .toolbar .picker {
      font-weight: 600; min-width: 240px;
      border-color: var(--accent); color: var(--fg);
    }
    .counter {
      font-size: 12px; color: var(--muted); font-weight: 600;
      font-variant-numeric: tabular-nums;
      padding: 0 8px;
    }
    .nav-btn {
      width: 32px; height: 30px; padding: 0 !important;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600;
    }

    /* ---- legend bar ---- */
    .legend-bar {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
      padding: 8px 20px;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      flex-shrink: 0;
    }
    .legend-bar .group { display: inline-flex; align-items: center; gap: 8px; }
    .legend-bar .group-title { font-weight: 700; color: var(--muted); font-size: 11px; }
    .legend-bar .item { display: inline-flex; align-items: center; gap: 4px; }
    .legend-bar .sw {
      display: inline-block; width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid currentColor;
    }
    .legend-bar .sw.u { background: #dcfce7; color: #16a34a; }
    .legend-bar .sw.i { background: #dbeafe; color: #2563eb; }
    .legend-bar .sw.s { background: #f3e8ff; color: #9333ea; }
    .legend-bar .sw.c { background: #fee2e2; color: #dc2626; }
    .legend-bar svg.line { color: var(--fg); }

    /* ---- stage ---- */
    main {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .preview {
      flex: 1; min-height: 0;
      overflow: auto;
      padding: 28px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .preview.zoomed { justify-content: flex-start; }
    .preview.draggable { cursor: grab; user-select: none; }
    .preview.draggable.dragging { cursor: grabbing; }
    .preview.draggable.dragging * { pointer-events: none; }
    .preview svg { display: block; margin: 0 auto; }
    .preview .svg-wrap {
      display: inline-block;
      transform-origin: top left;
      transition: transform 0.12s ease;
    }
    .preview.dragging .svg-wrap { transition: none; }
    .zoom-label {
      font-size: 12px; color: var(--muted); font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 42px; text-align: center;
      cursor: pointer;
    }
    .zoom-label:hover { color: var(--accent); }
    .error {
      color: var(--error); padding: 16px;
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 13px; white-space: pre-wrap; text-align: left;
    }

    /* ---- cover slide ---- */
    .slide-cover {
      max-width: 1100px; width: 100%;
      padding: 36px 48px;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-soft) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      text-align: left;
    }
    .slide-cover .hero {
      margin: 18px 0 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
    }
    .slide-cover .hero img {
      display: block; width: 100%; height: auto;
      max-height: 56vh; object-fit: contain;
      background: #fff;
    }
    .slide-cover .hero .caption {
      padding: 8px 14px;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--bg-soft);
    }
    .slide-cover .hero .caption strong { color: var(--fg); }

    /* ---- RACI 3x2 grid (HTML slide) ---- */
    .raci-wrap {
      max-width: 1280px; width: 100%;
    }
    .raci-head {
      margin-bottom: 16px;
      font-size: 15px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 6px 16px; align-items: center;
    }
    .raci-head strong { color: var(--accent); font-size: 18px; }
    .raci-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 18px;
    }
    .raci-cell {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
    }
    .raci-cell.has-star { border-color: var(--critical); border-width: 2px; }
    .raci-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--fg);
      border-bottom: 1px solid var(--border);
      padding-bottom: 9px;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }
    .raci-items {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .raci-item {
      font-size: 15px;
      padding: 10px 14px;
      border-radius: 7px;
      line-height: 1.5;
      border: 1px solid transparent;
    }
    .raci-item.user { background: #dcfce7; color: #14532d; border-color: #16a34a; }
    .raci-item.it { background: #dbeafe; color: #1e3a8a; border-color: #2563eb; }
    .raci-item.shared { background: #f3e8ff; color: #581c87; border-color: #9333ea; }
    .raci-item.critical { background: #fee2e2; color: #7f1d1d; border-color: #dc2626; }
    [data-theme="dark"] .raci-item.user { background: rgba(34, 197, 94, 0.18); color: #86efac; }
    [data-theme="dark"] .raci-item.it { background: rgba(96, 165, 250, 0.18); color: #93c5fd; }
    [data-theme="dark"] .raci-item.shared { background: rgba(168, 85, 247, 0.18); color: #d8b4fe; }
    [data-theme="dark"] .raci-item.critical { background: rgba(248, 113, 113, 0.18); color: #fca5a5; }
    .raci-foot {
      margin-top: 20px;
      padding: 14px 18px;
      background: var(--bg-soft);
      border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: 15px;
      color: var(--fg); line-height: 1.6;
    }
    .raci-foot strong { color: var(--accent); }

    /* ---- 通用卡片 grid(U2 / U3 / U4 / U5 用) ---- */
    .cards-wrap { max-width: 1280px; width: 100%; }
    .cards-head {
      margin-bottom: 18px;
      font-size: 15px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 6px 16px; align-items: center;
    }
    .cards-head strong { color: var(--accent); font-size: 19px; }
    .cards-grid { display: grid; gap: 16px; }
    .cards-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .cards-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .cards-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left-width: 5px;
      border-radius: 10px;
      padding: 16px 18px;
      display: flex; flex-direction: column;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.1);
    }
    .card.user { border-left-color: #16a34a; }
    .card.it { border-left-color: #2563eb; }
    .card.shared { border-left-color: #9333ea; }
    .card.critical { border-left-color: #dc2626; }
    .card-badges {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 10px;
    }
    .card-badge {
      display: inline-block;
      font-size: 12.5px; font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      margin-bottom: 9px;
      align-self: flex-start;
      letter-spacing: 0.02em;
    }
    .card-badges .card-badge { margin-bottom: 0; }
    .card-tag {
      display: inline-block;
      font-size: 11.5px;
      padding: 3px 8px;
      border-radius: 5px;
      background: var(--btn-hover);
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    [data-theme="dark"] .card-tag { background: rgba(148, 163, 184, 0.15); }
    .card.user .card-badge { background: #dcfce7; color: #14532d; }
    .card.it .card-badge { background: #dbeafe; color: #1e3a8a; }
    .card.shared .card-badge { background: #f3e8ff; color: #581c87; }
    .card.critical .card-badge { background: #fee2e2; color: #7f1d1d; }
    [data-theme="dark"] .card.user .card-badge { background: rgba(34,197,94,0.2); color: #86efac; }
    [data-theme="dark"] .card.it .card-badge { background: rgba(96,165,250,0.2); color: #93c5fd; }
    [data-theme="dark"] .card.shared .card-badge { background: rgba(168,85,247,0.2); color: #d8b4fe; }
    [data-theme="dark"] .card.critical .card-badge { background: rgba(248,113,113,0.2); color: #fca5a5; }
    .card-title {
      font-size: 17.5px; font-weight: 700;
      margin: 0 0 9px;
      color: var(--fg); line-height: 1.35;
    }
    .card-num {
      font-size: 14px; color: var(--muted);
      font-weight: 700; margin-right: 6px;
      font-variant-numeric: tabular-nums;
    }
    .card-body {
      font-size: 15px;
      color: var(--fg);
      line-height: 1.6;
    }
    .card-body strong { color: var(--accent); }
    .card-body code {
      background: var(--btn-hover);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13.5px;
      font-family: 'JetBrains Mono', Consolas, monospace;
    }
    .card-meta {
      margin-top: 11px;
      padding-top: 9px;
      border-top: 1px dashed var(--border);
      font-size: 13px; color: var(--muted);
    }
    .cards-foot {
      margin-top: 20px;
      padding: 14px 18px;
      background: var(--bg-soft);
      border-left: 4px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: 15px;
      color: var(--fg); line-height: 1.6;
    }
    .cards-foot strong { color: var(--accent); }

    /* ---- Before / After 對比 section(0.1 用) ---- */
    .compare-section { margin-bottom: 18px; }
    .compare-label {
      font-size: 16px;
      font-weight: 700;
      padding: 11px 18px;
      border-radius: 8px;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 10px;
    }
    .compare-section.bad .compare-label {
      background: #fee2e2; color: #7f1d1d;
      border-left: 5px solid #dc2626;
    }
    .compare-section.good .compare-label {
      background: #dcfce7; color: #14532d;
      border-left: 5px solid #16a34a;
    }
    [data-theme="dark"] .compare-section.bad .compare-label {
      background: rgba(248, 113, 113, 0.15); color: #fca5a5;
    }
    [data-theme="dark"] .compare-section.good .compare-label {
      background: rgba(34, 197, 94, 0.15); color: #86efac;
    }
    .compare-arrow {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      padding: 10px;
      margin: 4px 0 10px;
      letter-spacing: 0.08em;
    }
    .slide-cover .tag {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent); color: white;
      font-size: 12px; font-weight: 700;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .slide-cover .title {
      font-size: 44px; font-weight: 800;
      margin: 18px 0 8px;
      color: var(--accent);
      letter-spacing: 0.01em;
    }
    .slide-cover .subtitle {
      font-size: 18px; font-weight: 500;
      color: var(--fg); margin: 0 0 24px;
      line-height: 1.5;
    }
    .slide-cover .meta {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 6px 16px;
      font-size: 14px;
      margin-bottom: 24px;
      color: var(--fg);
    }
    .slide-cover .meta strong { color: var(--muted); font-weight: 600; }
    .slide-cover .role-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .slide-cover .role-table th, .slide-cover .role-table td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .slide-cover .role-table th { background: var(--btn-hover); font-weight: 700; }
    .slide-cover .role-table .dot {
      display: inline-block;
      width: 12px; height: 12px; border-radius: 3px;
      margin-right: 6px; vertical-align: middle;
    }
    .slide-cover .role-table .dot.u { background: #dcfce7; border: 1px solid #16a34a; }
    .slide-cover .role-table .dot.i { background: #dbeafe; border: 1px solid #2563eb; }
    .slide-cover .role-table .dot.s { background: #f3e8ff; border: 1px solid #9333ea; }
    .slide-cover .role-table .dot.c { background: #fee2e2; border: 1px solid #dc2626; }
    .slide-cover .foot {
      font-size: 12px; color: var(--muted);
      border-top: 1px dashed var(--border); padding-top: 12px;
    }
    .slide-cover .key-msg {
      background: #eff6ff; border-left: 4px solid var(--accent);
      padding: 10px 14px; margin: 14px 0;
      font-size: 13px; color: #1e3a8a;
      border-radius: 0 6px 6px 0;
    }
    [data-theme="dark"] .slide-cover .key-msg {
      background: rgba(96, 165, 250, 0.1); color: #93c5fd;
    }
  </style>
</head>

  <!--
    一個檔案內可放 N 張 slide(架構 / 流程 / 封面 / 對比)。
    新增 slide → 複製一份 <script type="text/plain"> 區塊,改 id / data-label / data-order / data-kind / data-format。

    規約:
      id            = 全域唯一,英數 + 連字號
      data-label    = 工具列下拉與 slide 標題顯示文字
      data-order    = 數字,picker / 鍵盤翻頁依此排序(不必連續,可塞 0.5)
      data-kind     = "architecture" | "flow" | "cover" | "compare"(僅做語意標記)
      data-format   = "mermaid"(預設) | "html"(內容直接當 HTML 渲染)
      data-desc     = 講者註記,以 HTML 字串呈現於下方 notes 面板

    鍵盤:← / → 翻頁;ESC 收/展 notes 面板。
  -->

  <!-- ================== 0. 封面 ================== -->
  <script type="text/plain" id="cover"
          data-label="0. 封面"
          data-order="0"
          data-kind="cover"
          data-format="html"
          data-desc="<strong>開場 30 秒 talking points:</strong>
<ul>
<li>這份 Breakdown 是把原始 Harness Engineering 架構圖,<strong>公司化客製</strong>為「<u>6 學習單元 × 三角色色碼 × Coolify 合規 × Data Hub 整合</u>」。</li>
<li><strong>Vibe Coding 公司定位</strong>:業務人員用 AI 自然語言驅動工作,IT(Agentic Engineer)建治理底座。</li>
<li>三色責任:🟢 業務(寫痛點 / 提供 ground truth) · 🔵 IT(建 Harness + 跑 Eval) · 🟣 共同(品質 + SOP + 主檔)。</li>
<li>本次 Demo 走線性順序:封面 → 為什麼需要 → 5 層總覽 → 責任分布 → U2-U5 各單元逐張深入。<strong>← / → 翻頁</strong>。</li>
</ul>">

    <tbody>
      <tr><td><span class="dot u"></span>🟢 使用者</td><td>業務人員 / 業務主管 / PM</td><td>L1 業務情境、需求 / 主管報告 Agent、Audit Trail 可審計人物</td></tr>

      <tr><td><span class="dot c"></span>🔴 ★ Critical</td><td>(附加標記,不是第四種角色)</td><td>L4 Sandbox / Logs / Audit、L5 Repo / Dashboard、Reward 約束</td></tr>
    </tbody>
  </table>

  <div class="key-msg">
    <strong>本檔差異 vs 原 Harness 架構:</strong>三色角色碼 + 加入 Data Hub(對應 DataFlow v1.0 § 3.3) + Agentic Engineer 屬 IT(非共同角色)+ Coolify 主合規層標記。

<div class="cards-wrap">

  <div class="compare-section bad">

    <div class="cards-grid cols-4">
      <div class="card critical">
        <div class="card-badges">
          <span class="card-badge">❌ 問題 1</span>
          <span class="card-tag">無版本控</span>
        </div>
        <div class="card-title">Prompt 線上熱改</div>

      <div class="card critical">
        <div class="card-badges">
          <span class="card-badge">❌ 問題 2</span>
          <span class="card-tag">無配額</span>
        </div>
        <div class="card-title">工具呼叫失控</div>
        <div class="card-body">Agent 想呼什麼就呼什麼。<strong>Token 費用爆炸</strong>,權限失控。</div>
      </div>
      <div class="card critical">
        <div class="card-badges">
          <span class="card-badge">❌ 問題 3</span>
          <span class="card-tag">無沙箱</span>
        </div>
        <div class="card-title">shell / fs 炸主機</div>
        <div class="card-body">Agent 拿到 shell 權限可以 <code>rm -rf /</code>,直連 DB 可以 <code>DROP TABLE</code>。</div>
      </div>
      <div class="card critical">
        <div class="card-badges">
          <span class="card-badge">❌ 問題 4</span>
          <span class="card-tag">無 Audit</span>
        </div>
        <div class="card-title">出事追不到責任</div>
        <div class="card-body">誰部署、誰核准、誰改 Prompt — <strong>完全沒紀錄</strong>。合規鑑定零分。</div>
      </div>
    </div>
  </div>

  <div class="compare-arrow">↓ 升級:Agent = Model + Harness ↓</div>

  <div class="compare-section good">
    <div class="compare-label">✅ 有 Harness:8 元件對應治理 — 4 大失控全收</div>
    <div class="cards-grid cols-4">
      <div class="card user">
        <div class="card-badges">
          <span class="card-badge">✅ 解法 1</span>
          <span class="card-tag">U4.1 + U4.5</span>
        </div>
        <div class="card-title">Prompts / Spec + CI</div>
        <div class="card-body">Git PR + version。<strong>Lint + Eval ≥ 閾值才能 merge</strong>。Coolify auto deploy,禁線上熱改。</div>
      </div>
      <div class="card user">
        <div class="card-badges">
          <span class="card-badge">✅ 解法 2</span>
          <span class="card-tag">U4.2</span>
        </div>
        <div class="card-title">Tool Gateway</div>
        <div class="card-body">白名單 + 配額管控所有對外呼叫。Token 走 Coolify env。<strong>Agent 不直連任何 store</strong>。</div>
      </div>
      <div class="card user">
        <div class="card-badges">
          <span class="card-badge">✅ 解法 3</span>
          <span class="card-tag">U4.4 ★</span>
        </div>
        <div class="card-title">Sandbox</div>
        <div class="card-body">non-root + read_only + tmpfs + 內網限定。<strong>shell 跑不了 <code>rm</code>,DB 連不到外網</strong>。</div>
      </div>
      <div class="card user">
        <div class="card-badges">
          <span class="card-badge">✅ 解法 4</span>
          <span class="card-tag">U4.6 + U4.8 ★</span>
        </div>
        <div class="card-title">Logs + Audit Trail</div>
        <div class="card-body">stdout 結構化 + Trace ID 跨 Agent;<strong>append-only Audit DB,retention ≥ 1 年</strong>。</div>
      </div>
    </div>
  </div>

  <div class="cards-foot">
    <strong>核心命題:</strong>Agent = Model + Harness。只給 Model 但沒給 Harness,<strong>8 件事</strong>(Prompts / Tools / Memory / Sandbox / Tests-CI / Logs / Hooks / Audit)都會出事。<strong>任何 Agent 要上 Coolify,8 件都不能缺</strong>。
  </div>
</div>

    direction LR
    L3A[L3 Agent<br><i>需求 / 品質 / NPI</i>]
    L4M[L4 Memory / RAG<br><i>長期知識</i>]
    L45F[L4.5 Flywheel<br><i>Domain data</i>]
  end

  Eng[Agentic Engineer<br><i>建 ETL / CDC</i>]

  Biz ==>|"維護主檔內容"| DH
  DH -->|REST<br>/api/v1/master/*| L3A
  DH -->|index<br>+ Embedding| L4M
  DH -->|脫敏訓練資料| L45F
  Eng -.建置 + 維運.-> DH

  classDef user fill:#dcfce7,stroke:#16a34a,color:#14532d
  classDef it fill:#dbeafe,stroke:#2563eb,color:#1e3a8a
  classDef shared fill:#f3e8ff,stroke:#9333ea,color:#581c87
  class Biz user
  class Org,Emp,Cust,Code,Item shared
  class L3A,L4M,L45F,Eng it
  </script>

  <!-- ================== 工具列 + 圖例 + 舞台 + 講者註記 ================== -->
  <header class="toolbar">
    <h1 id="title">Harness Engineering — Breakdown v1.0</h1>
    <button id="prev" class="nav-btn" title="上一頁(←)">‹</button>
    <span id="counter" class="counter">0 / 0</span>
    <button id="next" class="nav-btn" title="下一頁(→)">›</button>
    <select id="picker" class="picker"></select>
    <span class="divider"></span>
    <label>主題
      <select id="theme">
        <option value="default">Light</option>
        <option value="dark">Dark</option>
        <option value="neutral">Neutral</option>
        <option value="forest">Forest</option>
      </select>
    </label>
    <label>字體
      <input type="number" id="font-size" value="18" min="10" max="32" step="1" style="width: 56px;">
      <span>px</span>
    </label>
    <span class="divider"></span>
    <button id="zoom-out" class="nav-btn" title="縮小(- 鍵)">−</button>
    <span id="zoom-label" class="zoom-label" title="點擊重設為 100%(0 鍵)">100%</span>
    <button id="zoom-in" class="nav-btn" title="放大(+ 鍵)">+</button>
    <button id="zoom-fit" title="符合視窗(F 鍵)">Fit</button>
    <span class="divider"></span>
    <button id="copy-svg" title="複製 SVG 到剪貼簿">複製 SVG</button>
    <button id="download-svg" title="下載 SVG 檔">下載 SVG</button>
    <button id="download-png" title="下載 PNG(2× 解析度)">下載 PNG</button>
  </header>

  <div class="legend-bar">
    <div class="group">
      <span class="group-title">角色</span>
      <span class="item"><span class="sw u"></span>🟢 使用者</span>
      <span class="item"><span class="sw i"></span>🔵 IT</span>
      <span class="item"><span class="sw s"></span>🟣 共同</span>
      <span class="item"><span class="sw c"></span>🔴 ★ Critical</span>
    </div>
    <span class="divider" style="width:1px;height:18px;background:var(--border);"></span>
    <div class="group">
      <span class="group-title">箭頭</span>
      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="1.6"/></svg> 強依賴</span>
      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="1.6" stroke-dasharray="4 2"/></svg> 弱關聯 / 延伸</span>
      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="1.6" stroke-dasharray="1 2"/></svg> 約束</span>
      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="2.5"/></svg> 升級 / 主幹</span>
    </div>
  </div>

  <main>
    <div class="preview" id="preview"></div>
  </main>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const preview = document.getElementById('preview');
    const themeSelect = document.getElementById('theme');
    const fontSizeInput = document.getElementById('font-size');
    const picker = document.getElementById('picker');
    const counterEl = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const titleEl = document.getElementById('title');
    const zoomLabel = document.getElementById('zoom-label');
    const zoomIn = document.getElementById('zoom-in');
    const zoomOut = document.getElementById('zoom-out');
    const zoomFitBtn = document.getElementById('zoom-fit');

    let zoom = 1;
    const ZOOM_STEPS = [0.5, 0.6, 0.7, 0.8, 0.9, 1.0, 1.15, 1.3, 1.5, 1.75, 2.0, 2.5, 3.0];

    function findZoomIdx(z) {
      let best = 0, diff = Infinity;
      ZOOM_STEPS.forEach((v, i) => {
        const d = Math.abs(v - z);
        if (d < diff) { diff = d; best = i; }
      });
      return best;
    }
    function setZoom(z, recenter = false) {
      zoom = Math.max(0.3, Math.min(4, z));
      const wrap = preview.querySelector('.svg-wrap');
      if (wrap) {
        wrap.style.transform = `scale(${zoom})`;
        const svg = wrap.querySelector('svg');
        if (svg) {
          const w = parseFloat(svg.dataset.origW || svg.getBoundingClientRect().width / zoom);
          const h = parseFloat(svg.dataset.origH || svg.getBoundingClientRect().height / zoom);
          wrap.style.width = (w * zoom) + 'px';
          wrap.style.height = (h * zoom) + 'px';
        }
      }
      preview.classList.toggle('zoomed', zoom > 1.01);
      zoomLabel.textContent = Math.round(zoom * 100) + '%';
    }
    function zoomStep(dir) {
      const idx = findZoomIdx(zoom);
      const ni = Math.max(0, Math.min(ZOOM_STEPS.length - 1, idx + dir));
      setZoom(ZOOM_STEPS[ni]);
    }
    function zoomFit() {
      const svg = preview.querySelector('svg');
      if (!svg) { setZoom(1); return; }
      const w = parseFloat(svg.dataset.origW);
      const h = parseFloat(svg.dataset.origH);
      if (!w || !h) { setZoom(1); return; }
      const pad = 56;
      const fitX = (preview.clientWidth - pad) / w;
      const fitY = (preview.clientHeight - pad) / h;
      setZoom(Math.min(fitX, fitY, 4));
    }

    // 蒐集所有 slide 並依 data-order 排序
    const slides = Array.from(document.querySelectorAll('script[type="text/plain"][id]'))
      .map(el => ({
        el,
        id: el.id,
        label: el.dataset.label || el.id,
        order: parseFloat(el.dataset.order || '99'),
        kind: el.dataset.kind || 'flow',
        format: el.dataset.format || 'mermaid',
      }))
      .sort((a, b) => a.order - b.order);

    let currentIndex = 0;
    let renderToken = 0;

    function buildPicker() {
      picker.innerHTML = '';
      slides.forEach((s, idx) => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.label}`;
        picker.appendChild(opt);
      });
    }

    function updateCounter() {
      counterEl.textContent = `${currentIndex + 1} / ${slides.length}`;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === slides.length - 1;
    }

    function initMermaid() {
      const theme = themeSelect.value;
      mermaid.initialize({
        startOnLoad: false, theme,
        themeVariables: {
          fontFamily: '"Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif',
          fontSize: fontSizeInput.value + 'px',
        },
        flowchart: { useMaxWidth: false, htmlLabels: true },
        sequence: { useMaxWidth: false },
        securityLevel: 'loose',
      });
      document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
    }

    async function render() {
      const slide = slides[currentIndex];
      if (!slide) return;
      const code = slide.el.textContent.trim();
      const token = ++renderToken;

      titleEl.textContent = slide.label;
      zoom = 1; // 換頁時重設 zoom

      try {
        if (slide.format === 'html') {
          initMermaid(); // 仍套用 theme
          preview.innerHTML = code;
          preview.classList.remove('zoomed', 'draggable', 'dragging');
          zoomLabel.textContent = '100%';
        } else {
          initMermaid();
          const { svg } = await mermaid.render('diagram-' + token, code);
          if (token !== renderToken) return;
          // 用 wrapper div 包 SVG,用 transform 做 zoom
          preview.innerHTML = '<div class="svg-wrap">' + svg + '</div>';
          preview.classList.add('draggable');
          const svgEl = preview.querySelector('svg');
          if (svgEl) {
            const vb = svgEl.viewBox && svgEl.viewBox.baseVal;
            const origW = (vb && vb.width) || svgEl.getBoundingClientRect().width;
            const origH = (vb && vb.height) || svgEl.getBoundingClientRect().height;
            svgEl.dataset.origW = origW;
            svgEl.dataset.origH = origH;
            svgEl.removeAttribute('style');
          }
          elevateClusterLabels(svgEl);
          setZoom(1);
        }
      } catch (e) {
        if (token !== renderToken) return;
        const msg = (e && (e.message || e.str)) || String(e);
        preview.innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
      }
    }

    // 把 subgraph 標題抬到 SVG 最後一個 child(SVG 無 z-index,DOM 順序 = 繪製順序)。
    // 底色:取 page bg + ~75% 不透明,讓 cluster 顏色透出 ~25%;
    // 加上 cluster stroke 當細邊框,在視覺上跟所屬 subgraph 連動。
    function elevateClusterLabels(svg) {
      if (!svg) return;
      const root = svg.firstElementChild && svg.firstElementChild.tagName.toLowerCase() === 'g'
        ? svg.firstElementChild : svg;
      const labels = Array.from(svg.querySelectorAll('.cluster-label'));
      if (!labels.length) return;
      const pageBg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#ffffff';

      const entries = labels.map(label => {
        const text = (label.textContent || '').trim();
        if (!text) { label.style.opacity = '0'; return null; } // 空 / 純空白標籤直接隱藏(例 Row1/Row2 wrapper)
        const cluster = label.closest('.cluster');
        const clusterRect = cluster && cluster.querySelector(':scope > rect');
        let stroke = '#cbd5e1';
        if (clusterRect) {
          stroke = clusterRect.getAttribute('stroke')
                || getComputedStyle(clusterRect).stroke
                || stroke;
        }
        return { label, ctm: label.getCTM(), bbox: label.getBBox(), stroke };
      }).filter(Boolean);

      for (const { label, ctm, bbox, stroke } of entries) {
        if (!ctm) continue;
        const wrapper = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        wrapper.setAttribute('transform', `matrix(${ctm.a} ${ctm.b} ${ctm.c} ${ctm.d} ${ctm.e} ${ctm.f})`);
        wrapper.setAttribute('class', 'cluster-label-top');

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', bbox.x - 8);
        rect.setAttribute('y', bbox.y - 2);
        rect.setAttribute('width', bbox.width + 16);
        rect.setAttribute('height', bbox.height + 4);
        rect.setAttribute('fill', pageBg);
        rect.setAttribute('fill-opacity', '0.78');
        rect.setAttribute('stroke', stroke);
        rect.setAttribute('stroke-width', '1');
        rect.setAttribute('stroke-opacity', '0.6');
        rect.setAttribute('rx', '4');
        wrapper.appendChild(rect);

        const clone = label.cloneNode(true);
        clone.removeAttribute('transform');
        wrapper.appendChild(clone);

        label.style.opacity = '0';
        root.appendChild(wrapper);
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    function goTo(idx) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, idx));
      picker.value = slides[currentIndex].id;
      updateCounter();
      render();
    }

    function goToId(id) {
      const idx = slides.findIndex(s => s.id === id);
      if (idx >= 0) goTo(idx);
    }

    function downloadSVG() {
      const svg = preview.querySelector('svg');
      if (!svg) { flash('目前 slide 沒有 SVG 可下載'); return; }
      const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      triggerDownload(url, slides[currentIndex].id + '.svg');
      URL.revokeObjectURL(url);
    }

    async function downloadPNG() {
      const svg = preview.querySelector('svg');
      if (!svg) { flash('目前 slide 沒有 SVG 可下載'); return; }
      const serialized = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve; img.onerror = reject; img.src = url;
      });
      const scale = 2;
      const w = svg.viewBox.baseVal.width || svg.clientWidth;
      const h = svg.viewBox.baseVal.height || svg.clientHeight;
      const canvas = document.createElement('canvas');
      canvas.width = w * scale; canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = themeSelect.value === 'dark' ? '#0f172a' : '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      triggerDownload(canvas.toDataURL('image/png'), slides[currentIndex].id + '.png');
    }

    async function copySVG() {
      const svg = preview.querySelector('svg');
      if (!svg) { flash('目前 slide 沒有 SVG 可複製'); return; }
      try {
        await navigator.clipboard.writeText(svg.outerHTML);
        flash('已複製 SVG');
      } catch (e) {
        flash('複製失敗:' + e.message);
      }
    }

    function triggerDownload(href, filename) {
      const a = document.createElement('a');
      a.href = href; a.download = filename; a.click();
    }

    function flash(msg) {
      const original = titleEl.textContent;
      titleEl.textContent = msg;
      setTimeout(() => { titleEl.textContent = original; }, 1500);
    }

    // 事件
    buildPicker();
    picker.addEventListener('change', e => goToId(e.target.value));
    themeSelect.addEventListener('change', render);
    fontSizeInput.addEventListener('input', render);
    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));
    document.getElementById('download-svg').addEventListener('click', downloadSVG);
    document.getElementById('download-png').addEventListener('click', downloadPNG);
    document.getElementById('copy-svg').addEventListener('click', copySVG);

    zoomIn.addEventListener('click', () => zoomStep(1));
    zoomOut.addEventListener('click', () => zoomStep(-1));
    zoomFitBtn.addEventListener('click', zoomFit);
    zoomLabel.addEventListener('click', () => setZoom(1));

    // Ctrl + 滾輪 = 放大縮小
    preview.addEventListener('wheel', e => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      zoomStep(e.deltaY < 0 ? 1 : -1);
    }, { passive: false });

    // 拖曳平移(只在 SVG slide 上啟用,封面保留文字選取)
    let drag = null;
    preview.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (!preview.classList.contains('draggable')) return;
      drag = {
        startX: e.clientX, startY: e.clientY,
        scrollX: preview.scrollLeft, scrollY: preview.scrollTop,
        moved: false,
      };
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      if (!drag.moved && Math.abs(dx) + Math.abs(dy) > 3) {
        drag.moved = true;
        preview.classList.add('dragging');
      }
      if (drag.moved) {
        preview.scrollLeft = drag.scrollX - dx;
        preview.scrollTop = drag.scrollY - dy;
      }
    });
    document.addEventListener('mouseup', () => {
      if (!drag) return;
      drag = null;
      preview.classList.remove('dragging');
    });
    document.addEventListener('mouseleave', () => {
      if (!drag) return;
      drag = null;
      preview.classList.remove('dragging');
    });

    document.addEventListener('keydown', e => {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault(); goTo(currentIndex + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); goTo(currentIndex - 1);
      } else if (e.key === 'Home') {
        e.preventDefault(); goTo(0);
      } else if (e.key === 'End') {
        e.preventDefault(); goTo(slides.length - 1);
      } else if (e.key === '+' || e.key === '=') {
        e.preventDefault(); zoomStep(1);
      } else if (e.key === '-' || e.key === '_') {
        e.preventDefault(); zoomStep(-1);
      } else if (e.key === '0') {
        e.preventDefault(); setZoom(1);
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault(); zoomFit();
      }
    });

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      themeSelect.value = 'dark';
    }

    // 初始
    goTo(0);
  </script>
