<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">

  <title>Harness Engineering — Breakdown v1.0 (Vibe Coding 公司版)</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f8fafc;
      --fg: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --toolbar-bg: #f8fafc;
      --btn-bg: #ffffff;
      --btn-hover: #f1f5f9;
      --accent: #2563eb;
      --error: #dc2626;
      --user: #16a34a;
      --it: #2563eb;
      --shared: #9333ea;
      --critical: #dc2626;
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-soft: #1e293b;
      --fg: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --toolbar-bg: #1e293b;
      --btn-bg: #1e293b;
      --btn-hover: #334155;
      --accent: #60a5fa;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--fg);
    }
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ---- toolbar ---- */
    .toolbar {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 12px 20px;
      background: var(--toolbar-bg);
      border-bottom: 2px solid var(--border);
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 16px;
      margin: 0;
      margin-right: auto;
      font-weight: 700;
      color: var(--accent);
      padding-left: 12px;
      border-left: 4px solid var(--accent);
      line-height: 1.3;
      letter-spacing: 0.02em;
      max-width: 40%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toolbar .divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .toolbar button, .toolbar select, .toolbar input {
      padding: 6px 11px; font-size: 13px;
      border: 1px solid var(--border);
      background: var(--btn-bg); color: var(--fg);
      border-radius: 5px; cursor: pointer; font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
    }
    .toolbar button:hover, .toolbar select:hover {
      background: var(--btn-hover); border-color: var(--accent);
    }
    .toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
    .toolbar label {
      font-size: 12px; color: var(--muted);
      display: inline-flex; align-items: center; gap: 6px;
      font-weight: 500;
    }
    .toolbar .picker {
      font-weight: 600; min-width: 240px;
      border-color: var(--accent); color: var(--fg);
    }
    .counter {
      font-size: 12px; color: var(--muted); font-weight: 600;
      font-variant-numeric: tabular-nums;
      padding: 0 8px;
    }
    .nav-btn {
      width: 32px; height: 30px; padding: 0 !important;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600;
    }

    /* ---- legend bar ---- */
    .legend-bar {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
      padding: 8px 20px;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      flex-shrink: 0;
    }
    .legend-bar .group { display: inline-flex; align-items: center; gap: 8px; }
    .legend-bar .group-title { font-weight: 700; color: var(--muted); font-size: 11px; }
    .legend-bar .item { display: inline-flex; align-items: center; gap: 4px; }
    .legend-bar .sw {
      display: inline-block; width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid currentColor;
    }
    .legend-bar .sw.u { background: #dcfce7; color: #16a34a; }
    .legend-bar .sw.i { background: #dbeafe; color: #2563eb; }
    .legend-bar .sw.s { background: #f3e8ff; color: #9333ea; }
    .legend-bar .sw.c { background: #fee2e2; color: #dc2626; }
    .legend-bar svg.line { color: var(--fg); }

    /* ---- stage ---- */
    main {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .preview {
      flex: 1; min-height: 0;
      overflow: auto;
      padding: 28px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .preview svg { display: block; margin: 0 auto; max-width: 100%; height: auto; }
    .error {
      color: var(--error); padding: 16px;
      font-family: 'JetBrains Mono', Consolas, monospace;
      font-size: 13px; white-space: pre-wrap; text-align: left;
    }

    /* ---- speaker notes panel ---- */
    .notes {
      flex-shrink: 0;
      max-height: 38vh;
      overflow-y: auto;
      background: var(--bg-soft);
      border-top: 2px solid var(--border);
      padding: 14px 24px 16px;
      font-size: 13px; line-height: 1.65;
      transition: max-height 0.18s ease;
    }
    .notes.collapsed { max-height: 30px; overflow: hidden; padding: 4px 24px; cursor: pointer; }
    .notes .notes-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 6px;
      font-weight: 700; color: var(--accent); font-size: 13px;
    }
    .notes .toggle {
      margin-left: auto;
      padding: 2px 8px;
      font-size: 11px;
      background: var(--btn-bg); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; color: var(--muted);
    }
    .notes .toggle:hover { color: var(--accent); border-color: var(--accent); }
    .notes .body { color: var(--fg); }
    .notes.collapsed .body { display: none; }
    .notes strong { color: var(--accent); }
    .notes ul { margin: 4px 0; padding-left: 20px; }
    .notes li { margin: 2px 0; }
    .notes code {
      background: var(--btn-hover); padding: 1px 5px;
      border-radius: 3px; font-size: 12px;
      font-family: 'JetBrains Mono', Consolas, monospace;
    }

    /* ---- cover slide ---- */
    .slide-cover {
      max-width: 920px; width: 100%;
      padding: 40px 56px;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-soft) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      text-align: left;
    }
    .slide-cover .tag {
      display: inline-block;
      padding: 4px 12px;
      background: var(--accent); color: white;
      font-size: 12px; font-weight: 700;
      border-radius: 999px;
      letter-spacing: 0.05em;
    }
    .slide-cover .title {
      font-size: 44px; font-weight: 800;
      margin: 18px 0 8px;
      color: var(--accent);
      letter-spacing: 0.01em;
    }
    .slide-cover .subtitle {
      font-size: 18px; font-weight: 500;
      color: var(--fg); margin: 0 0 24px;
      line-height: 1.5;
    }
    .slide-cover .meta {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 6px 16px;
      font-size: 14px;
      margin-bottom: 24px;
      color: var(--fg);
    }
    .slide-cover .meta strong { color: var(--muted); font-weight: 600; }
    .slide-cover .role-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .slide-cover .role-table th, .slide-cover .role-table td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .slide-cover .role-table th { background: var(--btn-hover); font-weight: 700; }
    .slide-cover .role-table .dot {
      display: inline-block;
      width: 12px; height: 12px; border-radius: 3px;
      margin-right: 6px; vertical-align: middle;
    }
    .slide-cover .role-table .dot.u { background: #dcfce7; border: 1px solid #16a34a; }
    .slide-cover .role-table .dot.i { background: #dbeafe; border: 1px solid #2563eb; }
    .slide-cover .role-table .dot.s { background: #f3e8ff; border: 1px solid #9333ea; }
    .slide-cover .role-table .dot.c { background: #fee2e2; border: 1px solid #dc2626; }
    .slide-cover .foot {
      font-size: 12px; color: var(--muted);
      border-top: 1px dashed var(--border); padding-top: 12px;
    }
    .slide-cover .key-msg {
      background: #eff6ff; border-left: 4px solid var(--accent);
      padding: 10px 14px; margin: 14px 0;
      font-size: 13px; color: #1e3a8a;
      border-radius: 0 6px 6px 0;
    }
    [data-theme="dark"] .slide-cover .key-msg {
      background: rgba(96, 165, 250, 0.1); color: #93c5fd;
    }
  </style>
</head>

  <!-- ================== 0.1 為什麼需要 Harness ================== -->
  <script type="text/plain" id="arch-why"
          data-label="0.1 為什麼需要 Harness(Before vs After)"
          data-order="0.1"
          data-kind="compare"
          data-desc="<strong>核心命題:Agent = Model + Harness</strong>。只有 LLM 但沒有 Harness 會發生:
<ul>
<li><strong>Prompt 線上熱改 → 結果不可重現</strong>(沒版本控)</li>
<li><strong>工具呼叫失控 → 費用爆炸 / 權限失控</strong>(沒 Tool Gateway)</li>
<li><strong>跑 shell 炸主機 / DB</strong>(沒 Sandbox)</li>
<li><strong>出事追不到責任</strong>(沒 Audit Trail / Logs)</li>
</ul>
<strong>Harness 把 8 件事系統化</strong>:Prompts / Tools / Memory / Sandbox / Tests-CI / Logs / Hooks / Audit。任何 Agent 要上 Coolify,8 件都不能缺。">
%%{init: {'flowchart': {'htmlLabels': true, 'curve': 'basis'}} }%%
flowchart LR
  subgraph Before ["❌ 沒 Harness:Model-only 直呼"]
    direction TB
    B1["Agent (LLM 直呼)"]
    B1 -.->|無管制| BL[("LLM API<br>費用失控")]
    B1 -.->|直接讀寫| BD[("業務 DB<br>無權限切割")]
    B1 -.->|任意呼| BS["shell / fs<br>炸主機"]
    B1 -.->|無紀錄| BX["線上熱改 Prompt<br>無 Audit"]
  end

  subgraph After ["✅ 有 Harness:8 元件治理"]
    direction TB
    A1["Agent process"]
    A1 -->|統一收口| AG["Tool Gateway<br>白名單 + 配額"]
    AG --> AL[("LLM")]

    A1 --- AS["Sandbox<br>non-root / RO / 內網"]
    A1 -->|stdout JSON| AO["Logs + Trace<br>Trace ID"]
    A1 -->|append-only| AT["Audit Trail<br>合規可追溯"]
    A1 --- AM["Memory<br>Redis + RAG"]
    A1 --- AP["Prompts / Spec<br>Git 版控 + CI"]
  end

  Before == 升級 ==> After

  <!-- ================== 1. 五層架構總覽 ================== -->
  <script type="text/plain" id="arch"
          data-label="1. 五層架構總覽"
          data-order="1"
          data-kind="architecture"
          data-desc="<strong>5 層 + 飛輪:</strong>
<ul>
<li><strong>L1 🟢 公司 / 業務情境</strong> — 業務人員寫痛點清單,定義「為何要建這套」。</li>
<li><strong>L2 🔵 Agentic Engineer</strong> — IT 角色,把業務口語翻成可重複 Spec(Vibe Coding 公司關鍵差異)。</li>
<li><strong>L3 🔵 上層工作流</strong> — Control Plane + 6 種 Agent 協作。</li>
<li><strong>L4 🔵 Harness(★ 含 3 個 Critical 元件)</strong> — 8 元件執行底座,Coolify 主合規層。</li>
<li><strong>L4.5 🔵 Flywheel</strong> — IT 主導 Evals/Fine-tune,Reward 由業務確認。</li>
<li><strong>L5 🔵 基礎資源</strong> — IT 平台(LLM/Repo/Dashboard)+ 業務共同維護(PLM/SOP/TestLog/DataHub)。</li>
</ul>
<strong>關鍵讀法:</strong>L1 → L2 → L3 → L4 是線性「業務 → IT → Agent」;L4 → L4.5/L5 是「Harness 延伸學習能力 + 基礎物質」雙腳。">

  <!-- ================== 1.1 RACI 三角色責任分布 ================== -->
  <script type="text/plain" id="arch-raci"
          data-label="1.1 三角色責任分布(6 單元 × 三色)"
          data-order="1.1"
          data-kind="architecture"
          data-desc="<strong>這是整份文件最重要的「責任地圖」</strong> — 把『6 學習單元 × 三角色』一次攤平,讓每個角色一眼看到「我該管哪幾格」。
<ul>
<li><strong>使用者(🟢)只主導兩格</strong>:U1 痛點清單 + U3 需求/主管報告 Agent。其餘是 IT 或共同。</li>
<li><strong>IT(🔵)是主軸</strong>:U2-U4.5 主要工程化都在 IT 手上(對應 Vibe Coding 定位)。</li>
<li><strong>共同(🟣)三大區</strong>:U3 品質/NPI Agent + U4.5 Reward 標記 + U5 業務主檔。</li>
<li><strong>★ Critical(🔴)5 個點</strong>:U3 維運告警 + U4 Sandbox/Logs/Audit + U5 Repo/Dashboard。Coolify 上線前每條必過。</li>
</ul>
<strong>Demo 補充:</strong>讀 6.5.7 學習路徑(README §五)會更清楚每個角色該深讀哪幾單元。">

  <!-- ================== 工具列 + 圖例 + 舞台 + 講者註記 ================== -->
  <header class="toolbar">

    <span id="counter" class="counter">0 / 0</span>
    <button id="next" class="nav-btn" title="下一頁(→)">›</button>
    <select id="picker" class="picker"></select>
    <span class="divider"></span>
    <label>主題
      <select id="theme">
        <option value="default">Light</option>
        <option value="dark">Dark</option>

    <button id="copy-svg" title="複製 SVG 到剪貼簿">複製 SVG</button>

  </header>

  <div class="legend-bar">

    <div class="group">
      <span class="group-title">箭頭</span>

      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="1.6" stroke-dasharray="4 2"/></svg> 弱關聯 / 延伸</span>
      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="1.6" stroke-dasharray="1 2"/></svg> 約束</span>
      <span class="item"><svg class="line" width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke="currentColor" stroke-width="2.5"/></svg> 升級 / 主幹</span>

  </main>

  <aside class="notes" id="notes">
    <div class="notes-head">
      <span>📝 講者註記 / Speaker Notes</span>
      <button class="toggle" id="notes-toggle" title="ESC 也可切換">收起</button>
    </div>
    <div class="body" id="notes-body"></div>
  </aside>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const preview = document.getElementById('preview');
    const notesEl = document.getElementById('notes');
    const notesBody = document.getElementById('notes-body');
    const notesToggle = document.getElementById('notes-toggle');
    const themeSelect = document.getElementById('theme');
    const fontSizeInput = document.getElementById('font-size');
    const picker = document.getElementById('picker');
    const counterEl = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const titleEl = document.getElementById('title');

    // 蒐集所有 slide 並依 data-order 排序
    const slides = Array.from(document.querySelectorAll('script[type="text/plain"][id]'))
      .map(el => ({
        el,
        id: el.id,
        label: el.dataset.label || el.id,
        order: parseFloat(el.dataset.order || '99'),
        kind: el.dataset.kind || 'flow',
        format: el.dataset.format || 'mermaid',
      }))
      .sort((a, b) => a.order - b.order);

    let currentIndex = 0;
    let renderToken = 0;

    function buildPicker() {
      picker.innerHTML = '';
      slides.forEach((s, idx) => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.label}`;
        picker.appendChild(opt);
      });
    }

    function updateCounter() {
      counterEl.textContent = `${currentIndex + 1} / ${slides.length}`;
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === slides.length - 1;
    }

    function initMermaid() {
      const theme = themeSelect.value;
      mermaid.initialize({
        startOnLoad: false, theme,
        themeVariables: {
          fontFamily: '"Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif',
          fontSize: fontSizeInput.value + 'px',
        },
        flowchart: { useMaxWidth: false, htmlLabels: true },
        sequence: { useMaxWidth: false },
        securityLevel: 'loose',
      });
      document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
    }

    async function render() {
      const slide = slides[currentIndex];
      if (!slide) return;
      const code = slide.el.textContent.trim();
      const token = ++renderToken;

      titleEl.textContent = slide.label;
      notesBody.innerHTML = slide.el.dataset.desc || '<em style="color:var(--muted)">(此 slide 無註記)</em>';

      try {
        if (slide.format === 'html') {
          initMermaid(); // 仍套用 theme
          preview.innerHTML = code;
        } else {
          initMermaid();
          const { svg } = await mermaid.render('diagram-' + token, code);
          if (token !== renderToken) return;
          preview.innerHTML = svg;
          elevateClusterLabels(preview.querySelector('svg'));
        }
      } catch (e) {
        if (token !== renderToken) return;
        const msg = (e && (e.message || e.str)) || String(e);
        preview.innerHTML = '<div class="error">' + escapeHtml(msg) + '</div>';
      }
    }

    // 把 subgraph 標題抬到 SVG 最後一個 child(SVG 無 z-index,DOM 順序 = 繪製順序)。
    // 底色:取 page bg + ~75% 不透明,讓 cluster 顏色透出 ~25%;
    // 加上 cluster stroke 當細邊框,在視覺上跟所屬 subgraph 連動。
    function elevateClusterLabels(svg) {
      if (!svg) return;
      const root = svg.firstElementChild && svg.firstElementChild.tagName.toLowerCase() === 'g'
        ? svg.firstElementChild : svg;
      const labels = Array.from(svg.querySelectorAll('.cluster-label'));
      if (!labels.length) return;
      const pageBg = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#ffffff';

      const entries = labels.map(label => {
        const cluster = label.closest('.cluster');
        const clusterRect = cluster && cluster.querySelector(':scope > rect');
        let stroke = '#cbd5e1';
        if (clusterRect) {
          stroke = clusterRect.getAttribute('stroke')
                || getComputedStyle(clusterRect).stroke
                || stroke;
        }
        return { label, ctm: label.getCTM(), bbox: label.getBBox(), stroke };
      });

      for (const { label, ctm, bbox, stroke } of entries) {
        if (!ctm) continue;
        const wrapper = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        wrapper.setAttribute('transform', `matrix(${ctm.a} ${ctm.b} ${ctm.c} ${ctm.d} ${ctm.e} ${ctm.f})`);
        wrapper.setAttribute('class', 'cluster-label-top');

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', bbox.x - 8);
        rect.setAttribute('y', bbox.y - 2);
        rect.setAttribute('width', bbox.width + 16);
        rect.setAttribute('height', bbox.height + 4);
        rect.setAttribute('fill', pageBg);
        rect.setAttribute('fill-opacity', '0.78');
        rect.setAttribute('stroke', stroke);
        rect.setAttribute('stroke-width', '1');
        rect.setAttribute('stroke-opacity', '0.6');
        rect.setAttribute('rx', '4');
        wrapper.appendChild(rect);

        const clone = label.cloneNode(true);
        clone.removeAttribute('transform');
        wrapper.appendChild(clone);

        label.style.opacity = '0';
        root.appendChild(wrapper);
      }
    }

    function escapeHtml(s) {
      return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }

    function goTo(idx) {
      currentIndex = Math.max(0, Math.min(slides.length - 1, idx));
      picker.value = slides[currentIndex].id;
      updateCounter();
      render();
    }

    function goToId(id) {
      const idx = slides.findIndex(s => s.id === id);
      if (idx >= 0) goTo(idx);
    }

    function toggleNotes() {
      notesEl.classList.toggle('collapsed');
      notesToggle.textContent = notesEl.classList.contains('collapsed') ? '展開' : '收起';
    }

    function downloadSVG() {
      const svg = preview.querySelector('svg');
      if (!svg) { flash('目前 slide 沒有 SVG 可下載'); return; }
      const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      triggerDownload(url, slides[currentIndex].id + '.svg');
      URL.revokeObjectURL(url);
    }

    async function downloadPNG() {
      const svg = preview.querySelector('svg');
      if (!svg) { flash('目前 slide 沒有 SVG 可下載'); return; }
      const serialized = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve; img.onerror = reject; img.src = url;
      });
      const scale = 2;
      const w = svg.viewBox.baseVal.width || svg.clientWidth;
      const h = svg.viewBox.baseVal.height || svg.clientHeight;
      const canvas = document.createElement('canvas');
      canvas.width = w * scale; canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = themeSelect.value === 'dark' ? '#0f172a' : '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      triggerDownload(canvas.toDataURL('image/png'), slides[currentIndex].id + '.png');
    }

    async function copySVG() {
      const svg = preview.querySelector('svg');
      if (!svg) { flash('目前 slide 沒有 SVG 可複製'); return; }
      try {
        await navigator.clipboard.writeText(svg.outerHTML);
        flash('已複製 SVG');
      } catch (e) {
        flash('複製失敗:' + e.message);
      }
    }

    function triggerDownload(href, filename) {
      const a = document.createElement('a');
      a.href = href; a.download = filename; a.click();
    }

    function flash(msg) {
      const original = titleEl.textContent;
      titleEl.textContent = msg;
      setTimeout(() => { titleEl.textContent = original; }, 1500);
    }

    // 事件
    buildPicker();
    picker.addEventListener('change', e => goToId(e.target.value));
    themeSelect.addEventListener('change', render);
    fontSizeInput.addEventListener('input', render);
    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));
    notesToggle.addEventListener('click', toggleNotes);
    document.getElementById('download-svg').addEventListener('click', downloadSVG);
    document.getElementById('download-png').addEventListener('click', downloadPNG);
    document.getElementById('copy-svg').addEventListener('click', copySVG);

    document.addEventListener('keydown', e => {
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault(); goTo(currentIndex + 1);
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); goTo(currentIndex - 1);
      } else if (e.key === 'Escape') {
        e.preventDefault(); toggleNotes();
      } else if (e.key === 'Home') {
        e.preventDefault(); goTo(0);
      } else if (e.key === 'End') {
        e.preventDefault(); goTo(slides.length - 1);
      }
    });

    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      themeSelect.value = 'dark';
    }

    // 初始
    goTo(0);
  </script>
</body>
