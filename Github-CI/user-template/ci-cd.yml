# Auto-CI-CD caller 模板 — 由 user-template skill 依專案技術棧客製後寫進 .github/workflows/ci-cd.yml
#
# 客製點(見 SKILL.md 步驟 3):
#   - backend-ci 的 uses: 依後端棧改 ci-backend-python / ci-backend-node / ci-backend-java
#   - 無獨立前端(Jinja2 等 server-rendered):刪掉 frontend-ci job、
#     auto-cicd 的 needs 改 [backend-ci]、移除 with.frontend_result 那行
#   - df-recycle / @v1 改成貴公司中央 repo 與版本
name: ci-cd

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]    # merge 後再跑一次確認

concurrency:
  group: ci-cd-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── 步驟③ 前端 CI(無獨立前端的專案刪掉整個 frontend-ci job) ──
  frontend-ci:
    uses: df-recycle/ci-workflows/.github/workflows/ci-frontend-node.yml@v1

  # ── 步驟③ 後端 CI(三選一:python / node / java) ──
  backend-ci:
    uses: df-recycle/ci-workflows/.github/workflows/ci-backend-python.yml@v1

  # ── 步驟④~⑦ 後續流程(固定,與技術棧無關) ──
  auto-cicd:
    needs: [frontend-ci, backend-ci]
    if: always()
    uses: df-recycle/ci-workflows/.github/workflows/auto-cicd.yml@v1
    with:
      frontend_result: ${{ needs.frontend-ci.result }}
      backend_result: ${{ needs.backend-ci.result }}
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      issues: write
      statuses: write
      security-events: write
