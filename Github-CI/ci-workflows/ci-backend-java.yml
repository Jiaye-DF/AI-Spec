# ci-workflows 中央 reusable — 後端 CI(Java)
#
# 契約:專案根目錄有 backend/,內含 Maven 專案(pom.xml)。
# 預設 mvn -B verify(編譯 + 單元測試 + 套件解析)。
# Gradle 專案:caller 傳 with: build_command: "./gradlew build"。
name: ci-backend-java (reusable)

on:
  workflow_call:
    inputs:
      java_version:
        description: "JDK 版本"
        type: string
        default: "21"
      build_command:
        description: "建置 / 測試指令(Gradle 專案改 ./gradlew build)"
        type: string
        default: "mvn -B verify"

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}
          cache: maven
      - run: ${{ inputs.build_command }}
