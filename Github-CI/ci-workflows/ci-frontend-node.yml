# ci-workflows 中央 reusable — 前端 CI(npm 系:React / Vue / 任何 npm 前端)
#
# 對齊 Harness 05-CI/01-frontend-jobs。
# 契約:專案根目錄有 frontend/,且 frontend/package.json 定義 lint / typecheck / test / build scripts。
# React 與 Vue 共用本檔 —— 差異在專案的 package.json 與設定檔,CI 指令一致。
name: ci-frontend-node (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --run
      - run: npm run build
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true        # 過渡期;成熟後改 false(見 Harness 05-CI/03)
